---
name: "Reviewers action"
author: Yevhen Fabizhevskyi
description: |
  This GitHub action to parse a CODEOWNERS like files and use it to set reviewers
  on PRs.
branding:
  icon: file-text
  color: white
inputs:
  github-token:
    description: "Auth token with permissions to assign reviewers to a PR."
    required: false
    default: "${{ github.token }}"
  pr-number:
    description: "PR number to assign reviewers to."
    required: false
    default: "${{ github.event.pull_request.number }}"
  reviewers-filename:
    description: "CODEOWNERS like filename."
    required: false
    default: "REVIEWERS"
runs:
  using: "composite"
  steps:
    - name: Validate inputs
      env:
        INPUT_GITHUB_TOKEN: "${{ inputs.github-token }}"
        INPUT_PR_NUMBER: "${{ inputs.pr-number }}"
        INPUT_REVIEWERS_FILENAME: "${{ inputs.reviewers-filename }}"
      shell: sh
      run: |
        ./validate-inputs.sh \
          "${INPUT_GITHUB_TOKEN}" \
          "${INPUT_PR_NUMBER}" \
          "${INPUT_REVIEWERS_FILENAME}"
      working-directory: ${{ github.action_path }}/src

    - name: Validate installed tools
      id: tools
      shell: sh
      run: ./validate-installed-tools.sh
      working-directory: ${{ github.action_path }}/src

    - name: Setup curl
      if: steps.tools.outputs.curl == 'false'
      shell: sh
      run: ./install-curl.sh
      working-directory: ${{ github.action_path }}/src

    - name: Setup node
      if: steps.tools.outputs.node == 'false' || steps.tools.outputs.npm == 'false'
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - name: Install codeowners
      if: steps.tools.outputs.codeowners == 'false'
      shell: sh
      run: npm install -g codeowners

    - name: Get list of changed files
      id: changed-files
      shell: sh
      run: ./get-changed-files.sh "${GITHUB_BASE_REF}" "${GITHUB_HEAD_REF}"
      working-directory: ${{ github.action_path }}/src

    - name: Collect reviewers
      id: reviewers
      env:
        INPUT_REVIEWERS_FILENAME: "${{ inputs.reviewers-filename }}"
        CHANGED_FILES_OUTPUT_ALL: "${{ steps.changed-files.outputs.all }}"
      run: |
        ${GITHUB_ACTION_PATH}/src/get-reviewers.sh \
          "${INPUT_REVIEWERS_FILENAME}" \
          "${CHANGED_FILES_OUTPUT_ALL}"
      shell: bash

    - name: Assign reviewers
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        INPUT_PR_NUMBER: ${{ inputs.pr-number }}
        REVIEWERS_OUTPUT_JSON: "${{ steps.reviewers.outputs.json }}"
      run: |
        ./assign-reviewers.sh \
          "${GITHUB_API_URL}" \
          "${GITHUB_REPOSITORY}" \
          "${GH_TOKEN}" \
          "${INPUT_PR_NUMBER}" \
          "${REVIEWERS_OUTPUT_JSON}"
      shell: sh
      working-directory: ${{ github.action_path }}/src
